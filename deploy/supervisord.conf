[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:pocketbase]
; Run from /app/pocketbase so that relative paths (./pb_migrations, ./pb_hooks) resolve correctly.
directory=/app/pocketbase
command=/app/pocketbase/pocketbase serve --http=0.0.0.0:8090 --encryptionEnv=PB_ENCRYPTION_KEY --dir=/data --migrationsDir=./pb_migrations --hooksDir=./pb_hooks --hooksWatch=false
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:node-ssr]
; Vike SSR server — renders HTML for crawlers and users
directory=/app/web
command=node server/index.js
environment=NODE_ENV=production,PORT=3000,PB_URL=http://127.0.0.1:8090
autostart=true
autorestart=true
priority=25
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:sitemap-generator]
; One-shot: waits for PocketBase, then regenerates sitemap.xml with live content.
command=/usr/local/bin/generate-sitemap.sh
autostart=true
autorestart=false
startsecs=0
priority=30
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
