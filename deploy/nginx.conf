user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status '
                    '$body_bytes_sent "$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout  65;

    # Allow up to 20 MB uploads (media library images)
    client_max_body_size 20M;

    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # ── PocketBase proxy ─────────────────────────────────────────────
        # The frontend calls /hcgi/platform as its PocketBase base URL.
        # Strip that prefix and forward to PocketBase running on port 8090.
        # Examples:
        #   /hcgi/platform/api/collections  →  http://127.0.0.1:8090/api/collections
        #   /hcgi/platform/_/               →  http://127.0.0.1:8090/_/
        location /hcgi/platform {
            rewrite ^/hcgi/platform/?(.*)$ /$1 break;

            proxy_pass         http://127.0.0.1:8090;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support – needed for PocketBase realtime subscriptions
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # Long timeouts for SSE / realtime connections
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── OpenAI API proxy ──────────────────────────────────────────────
        # The frontend sends AI requests to /api/ai/openai/* which we strip
        # and forward to the real OpenAI API. The API key travels in the
        # Authorization header set by the browser (stored client-side).
        location /api/ai/openai/ {
            rewrite ^/api/ai/openai/(.*)$ /$1 break;

            proxy_pass         https://api.openai.com;
            proxy_ssl_server_name on;
            proxy_set_header   Host api.openai.com;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── OpenRouter API proxy ─────────────────────────────────────────
        location /api/ai/openrouter/ {
            rewrite ^/api/ai/openrouter/(.*)$ /api/$1 break;

            proxy_pass         https://openrouter.ai;
            proxy_ssl_server_name on;
            proxy_set_header   Host openrouter.ai;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Static assets with long-term caching ─────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            try_files   $uri =404;
        }

        # ── SPA fallback ──────────────────────────────────────────────────
        # All other routes are handled by the React router.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
